<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Besucherzähler</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #f0ece4;
    --muted: #555;
    --in: #b8f5a0;
    --out: #f5a0a0;
    --warn: #f5d070;
    --danger: #ff4040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .label {
    font-size: 11px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
    transition: background .3s;
  }
  .status-dot.live { background: var(--in); box-shadow: 0 0 8px var(--in); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  .count-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px 24px 28px;
    text-align: center;
    transition: border-color .3s, background .3s;
    position: relative;
    overflow: hidden;
  }

  .count-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--in);
    transition: background .3s;
  }

  .count-card.warning { border-color: #5a4a00; background: #141200; }
  .count-card.warning::after { background: var(--warn); }
  .count-card.danger  { border-color: #5a0000; background: #130000; animation: shake .4s; }
  .count-card.danger::after  { background: var(--danger); }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-6px)}
    75%{transform:translateX(6px)}
  }

  .count-label {
    font-size: 11px;
    letter-spacing: .2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .count-number {
    font-family: 'Syne', sans-serif;
    font-size: clamp(72px, 22vw, 120px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -.02em;
    color: var(--text);
    transition: color .3s;
  }

  .count-number.pop { animation: pop .15s ease-out; }
  @keyframes pop { 0%{transform:scale(1.08)} 100%{transform:scale(1)} }
  .count-number.warning { color: var(--warn); }
  .count-number.danger  { color: var(--danger); }

  .limit-bar-wrap {
    margin-top: 20px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .limit-bar {
    height: 100%;
    background: var(--in);
    border-radius: 2px;
    transition: width .4s ease, background .3s;
    width: 0%;
  }

  .limit-info {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
  }
  .limit-info span:last-child { color: var(--text); }

  .alert {
    background: #1a0000;
    border: 1px solid #5a0000;
    border-radius: 4px;
    padding: 16px;
    font-size: 15px;
    color: var(--danger);
    letter-spacing: .08em;
    text-align: center;
    display: none;
    font-weight: 500;
  }
  .alert.visible { display: block; }

  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn {
    border: none;
    border-radius: 4px;
    padding: 0;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: .1em;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
    transition: transform .1s, opacity .1s;
    user-select: none;
  }
  .btn:active { transform: scale(.96); opacity: .85; }

  .btn-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 28px 16px;
  }

  .btn-icon { font-size: 32px; line-height: 1; }
  .btn-in  { background: #0d1f09; border: 1px solid #2a5020; color: var(--in); }
  .btn-out { background: #1f0909; border: 1px solid #502020; color: var(--out); }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-val.in  { color: var(--in); }
  .stat-val.out { color: var(--out); }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .15em;
    text-transform: uppercase;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="label">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Verbinde...</span>
    </div>
    <div class="label" id="timeLabel">—</div>
  </header>

  <div class="count-card" id="countCard">
    <div class="count-label">Im Raum</div>
    <div class="count-number" id="countDisplay">0</div>
    <div class="limit-bar-wrap">
      <div class="limit-bar" id="limitBar"></div>
    </div>
    <div class="limit-info">
      <span id="limitLabel">Limit: —</span>
      <span id="remainingLabel">— frei</span>
    </div>
  </div>

  <div class="alert" id="alertBanner">⚠ LIMIT ERREICHT — Einlass stoppen!</div>

  <div class="buttons">
    <button class="btn btn-in" onclick="change(1)">
      <div class="btn-inner">
        <span class="btn-icon">↑</span>
        <span>Rein</span>
      </div>
    </button>
    <button class="btn btn-out" onclick="change(-1)">
      <div class="btn-inner">
        <span class="btn-icon">↓</span>
        <span>Raus</span>
      </div>
    </button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-val in" id="statIn">0</div>
      <div class="stat-label">Rein</div>
    </div>
    <div class="stat">
      <div class="stat-val out" id="statOut">0</div>
      <div class="stat-label">Raus</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statPeak">0</div>
      <div class="stat-label">Peak</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, runTransaction }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey:            "AIzaSyASCut5_OckQ4MXASTZMmctf3zXqQKwmfw",
  authDomain:        "door-counter-77820.firebaseapp.com",
  databaseURL:       "https://door-counter-77820-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "door-counter-77820",
  storageBucket:     "door-counter-77820.firebasestorage.app",
  messagingSenderId: "910578058610",
  appId:             "1:910578058610:web:afd083bb956713d890c9eb"
};

const app        = initializeApp(firebaseConfig);
const db         = getDatabase(app);
const counterRef = ref(db, 'counter');
const settingsRef= ref(db, 'settings');

let LIMIT = 200;

// Listen to settings (limit)
onValue(settingsRef, (snap) => {
  const s = snap.val();
  if (s && s.limit) {
    LIMIT = s.limit;
    document.getElementById('limitLabel').textContent = `Limit: ${LIMIT}`;
  }
});

// Listen to counter
onValue(counterRef, (snap) => {
  const d = snap.val() || { count: 0, totalIn: 0, totalOut: 0, peak: 0 };
  updateUI(d.count, d.totalIn, d.totalOut, d.peak);
  setStatus(true, 'Live');
  document.getElementById('timeLabel').textContent =
    new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}, () => setStatus(false, 'Verbindungsfehler'));

window.change = function(delta) {
  runTransaction(counterRef, (current) => {
    if (!current) current = { count: 0, totalIn: 0, totalOut: 0, peak: 0 };
    const newCount = Math.max(0, (current.count || 0) + delta);
    return {
      count:    newCount,
      totalIn:  (current.totalIn  || 0) + (delta > 0 ? delta : 0),
      totalOut: (current.totalOut || 0) + (delta < 0 ? Math.abs(delta) : 0),
      peak:     Math.max(current.peak || 0, newCount),
    };
  });
};

function updateUI(count, totalIn, totalOut, peak) {
  const card    = document.getElementById('countCard');
  const display = document.getElementById('countDisplay');
  const bar     = document.getElementById('limitBar');
  const alert   = document.getElementById('alertBanner');

  const remaining = Math.max(0, LIMIT - count);
  const pct       = Math.min(100, (count / LIMIT) * 100);

  display.textContent = count;
  document.getElementById('statIn').textContent   = totalIn;
  document.getElementById('statOut').textContent  = totalOut;
  document.getElementById('statPeak').textContent = peak;
  document.getElementById('remainingLabel').textContent = `${remaining} frei`;
  bar.style.width = pct + '%';

  display.classList.remove('pop');
  void display.offsetWidth;
  display.classList.add('pop');

  card.classList.remove('warning', 'danger');
  display.classList.remove('warning', 'danger');
  alert.classList.remove('visible');
  bar.style.background = 'var(--in)';

  if (count >= LIMIT) {
    card.classList.add('danger');
    display.classList.add('danger');
    alert.classList.add('visible');
    bar.style.background = 'var(--danger)';
  } else if (count >= LIMIT * 0.85) {
    card.classList.add('warning');
    display.classList.add('warning');
    bar.style.background = 'var(--warn)';
  }
}

function setStatus(live, text) {
  document.getElementById('statusDot').className = 'status-dot' + (live ? ' live' : '');
  document.getElementById('statusText').textContent = text;
}
</script>
</body>
</html>
